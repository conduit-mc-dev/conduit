<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Screen 02 — 创建实例</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #010409; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #e6edf3; overflow: hidden; }
  .app { display: flex; height: 100vh; width: 100vw; }

  /* NavigationRail */
  .navrail {
    width: 72px; flex-shrink: 0;
    background: #0d1117;
    border-right: 1px solid #21262d;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 6px;
  }
  .nav-logo {
    width: 44px; height: 44px; border-radius: 13px;
    background: linear-gradient(135deg, #58a6ff, #a371f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 20px;
  }
  .nav-item {
    width: 56px; padding: 10px 0 8px; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item span { font-size: 9px; }
  .nav-item.active { background: rgba(88,166,255,0.12); }
  .nav-item.active span { color: #58a6ff; font-weight: 700; }
  .nav-item:not(.active) span { color: #6e7681; }
  .nav-spacer { flex: 1; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; background: #0d1117; }

  /* Create instance form */
  .create-container {
    flex: 1; display: flex; align-items: flex-start; justify-content: center;
    padding: 40px; overflow-y: auto;
  }
  .create-form {
    width: 440px; background: #161b22; border: 1px solid #21262d;
    border-radius: 14px; padding: 24px;
  }
  .create-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .create-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: #0d1117; border: 1px solid #21262d;
    display: flex; align-items: center; justify-content: center;
  }
  .create-icon svg { width: 20px; height: 20px; stroke: #58a6ff; }
  .create-title { font-size: 18px; font-weight: 700; }
  .create-subtitle { font-size: 12px; color: #8b949e; }

  .field { margin-bottom: 16px; }
  .field-label {
    font-size: 11px; color: #8b949e; font-weight: 600;
    margin-bottom: 6px; display: block;
  }
  .field-input {
    width: 100%; background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    color: #e6edf3; outline: none; transition: border 0.15s;
  }
  .field-input:focus { border-color: #58a6ff; }
  .field-input::placeholder { color: #484f58; }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .select {
    width: 100%; background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    color: #e6edf3; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center;
  }
  .select-arrow { color: #484f58; font-size: 10px; }

  .version-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .v-chip {
    background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
    padding: 5px 12px; font-size: 11px; color: #8b949e; cursor: pointer;
    transition: all 0.15s;
  }
  .v-chip:hover { border-color: #30363d; color: #e6edf3; }
  .v-chip.selected { border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,0.08); }

  .loader-tabs {
    display: flex; gap: 0; margin-bottom: 8px;
    border-bottom: 1px solid #21262d;
  }
  .loader-tab {
    padding: 6px 14px; font-size: 11px; color: #8b949e;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .loader-tab.active {
    color: #58a6ff; font-weight: 600; border-bottom-color: #58a6ff;
  }
  .loader-tab:hover:not(.active) { color: #e6edf3; }

  .section-divider {
    height: 1px; background: #21262d; margin: 20px 0;
  }

  .form-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
  }
  .btn {
    padding: 10px 20px; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-cancel { background: #21262d; color: #e6edf3; }
  .btn-cancel:hover { background: #30363d; }
  .btn-create { background: #58a6ff; color: #0d1117; }
  .btn-create:hover { background: #79c0ff; }

  .hint { font-size: 10px; color: #484f58; margin-top: 4px; }

  .page-label {
    position: fixed; bottom: 12px; right: 16px;
    background: rgba(22,27,34,0.9); border: 1px solid #21262d;
    border-radius: 8px; padding: 6px 12px;
    font-size: 11px; color: #484f58;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div class="app">
  <nav class="navrail">
    <div class="nav-logo"><svg viewBox="0 0 320 320" width="44" height="44" shape-rendering="crispEdges"><rect x="112" y="16" width="32" height="32" fill="#0B3D4E"/><rect x="144" y="16" width="32" height="32" fill="#0B3D4E"/><rect x="176" y="16" width="32" height="32" fill="#0B3D4E"/><rect x="80" y="48" width="32" height="32" fill="#0B3D4E"/><rect x="112" y="48" width="32" height="32" fill="#2BCEE9"/><rect x="144" y="48" width="32" height="32" fill="#2BCEE9"/><rect x="176" y="48" width="32" height="32" fill="#2BCEE9"/><rect x="208" y="48" width="32" height="32" fill="#0B3D4E"/><rect x="48" y="80" width="32" height="32" fill="#0B3D4E"/><rect x="80" y="80" width="32" height="32" fill="#2BCEE9"/><rect x="112" y="80" width="32" height="32" fill="#2BCEE9"/><rect x="144" y="80" width="32" height="32" fill="#2BCEE9"/><rect x="176" y="80" width="32" height="32" fill="#2BCEE9"/><rect x="208" y="80" width="32" height="32" fill="#2BCEE9"/><rect x="240" y="80" width="32" height="32" fill="#0B3D4E"/><rect x="16" y="112" width="32" height="32" fill="#0B3D4E"/><rect x="48" y="112" width="32" height="32" fill="#2BCEE9"/><rect x="80" y="112" width="32" height="32" fill="#2BCEE9"/><rect x="112" y="112" width="32" height="32" fill="#2BCEE9"/><rect x="144" y="112" width="32" height="32" fill="#E9FBFF"/><rect x="176" y="112" width="32" height="32" fill="#2BCEE9"/><rect x="208" y="112" width="32" height="32" fill="#2BCEE9"/><rect x="240" y="112" width="32" height="32" fill="#2BCEE9"/><rect x="272" y="112" width="32" height="32" fill="#0B3D4E"/><rect x="16" y="144" width="32" height="32" fill="#0B3D4E"/><rect x="48" y="144" width="32" height="32" fill="#2BCEE9"/><rect x="80" y="144" width="32" height="32" fill="#2BCEE9"/><rect x="112" y="144" width="32" height="32" fill="#E9FBFF"/><rect x="144" y="144" width="32" height="32" fill="#E9FBFF"/><rect x="176" y="144" width="32" height="32" fill="#E9FBFF"/><rect x="208" y="144" width="32" height="32" fill="#2BCEE9"/><rect x="240" y="144" width="32" height="32" fill="#2BCEE9"/><rect x="272" y="144" width="32" height="32" fill="#0B3D4E"/><rect x="16" y="176" width="32" height="32" fill="#0B3D4E"/><rect x="48" y="176" width="32" height="32" fill="#2BCEE9"/><rect x="80" y="176" width="32" height="32" fill="#2BCEE9"/><rect x="112" y="176" width="32" height="32" fill="#2BCEE9"/><rect x="144" y="176" width="32" height="32" fill="#E9FBFF"/><rect x="176" y="176" width="32" height="32" fill="#2BCEE9"/><rect x="208" y="176" width="32" height="32" fill="#2BCEE9"/><rect x="240" y="176" width="32" height="32" fill="#2BCEE9"/><rect x="272" y="176" width="32" height="32" fill="#0B3D4E"/><rect x="48" y="208" width="32" height="32" fill="#0B3D4E"/><rect x="80" y="208" width="32" height="32" fill="#2BCEE9"/><rect x="112" y="208" width="32" height="32" fill="#2BCEE9"/><rect x="144" y="208" width="32" height="32" fill="#2BCEE9"/><rect x="176" y="208" width="32" height="32" fill="#2BCEE9"/><rect x="208" y="208" width="32" height="32" fill="#2BCEE9"/><rect x="240" y="208" width="32" height="32" fill="#0B3D4E"/><rect x="80" y="240" width="32" height="32" fill="#0B3D4E"/><rect x="112" y="240" width="32" height="32" fill="#2BCEE9"/><rect x="144" y="240" width="32" height="32" fill="#2BCEE9"/><rect x="176" y="240" width="32" height="32" fill="#2BCEE9"/><rect x="208" y="240" width="32" height="32" fill="#0B3D4E"/><rect x="112" y="272" width="32" height="32" fill="#0B3D4E"/><rect x="144" y="272" width="32" height="32" fill="#0B3D4E"/><rect x="176" y="272" width="32" height="32" fill="#0B3D4E"/></svg></div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Servers</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><polygon points="5 3 19 12 5 21"/></svg>
      <span>Launch</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4"/>
      </svg>
      <span>Settings</span>
    </div>
    <div class="nav-spacer"></div>
  </nav>

  <main class="main">
    <div class="create-container">
      <div class="create-form">
        <div class="create-header">
          <div class="create-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
          <div>
            <div class="create-title">Create Instance</div>
            <div class="create-subtitle">Set up a new Minecraft server or client</div>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Instance Name</label>
          <input class="field-input" placeholder="My Server" value="">
        </div>

        <div class="field">
          <label class="field-label">Minecraft Version</label>
          <div class="select">
            <span style="color:#484f58;">Select version...</span>
            <span class="select-arrow">▼</span>
          </div>
          <div class="version-chips">
            <div class="v-chip">1.21.4</div>
            <div class="v-chip selected">1.20.4</div>
            <div class="v-chip">1.20.1</div>
            <div class="v-chip">1.19.4</div>
            <div class="v-chip">1.18.2</div>
            <div class="v-chip" style="color:#484f58;">More...</div>
          </div>
        </div>

        <div class="section-divider"></div>

        <div class="field">
          <label class="field-label">Mod Loader</label>
          <div class="loader-tabs">
            <div class="loader-tab active">NeoForge</div>
            <div class="loader-tab">Fabric</div>
            <div class="loader-tab">Quilt</div>
            <div class="loader-tab">Forge</div>
            <div class="loader-tab">Vanilla</div>
          </div>
          <div class="select">
            <span>NeoForge 20.4.237</span>
            <span class="select-arrow">▼</span>
          </div>
          <div class="hint">Auto-selected latest compatible version</div>
        </div>

        <div class="section-divider"></div>

        <div class="field">
          <label class="field-label">Server Port</label>
          <div class="field-row">
            <div class="field">
              <input class="field-input" placeholder="25565" value="25565">
            </div>
            <div class="field">
              <label class="field-label">Max Players</label>
              <input class="field-input" placeholder="20" value="20">
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-cancel">Cancel</button>
          <button class="btn btn-create">Create Instance</button>
        </div>
      </div>
    </div>
  </main>

  <div class="page-label">Screen 02 — Create Instance</div>
</div>
</body>
</html>
