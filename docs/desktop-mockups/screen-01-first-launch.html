<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Screen 01 — 首次启动</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #010409; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #e6edf3; overflow: hidden; }
  .app { display: flex; height: 100vh; width: 100vw; }

  /* NavigationRail */
  .navrail {
    width: 72px; flex-shrink: 0;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    border-right: 1px solid rgba(88,166,255,0.12);
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 6px;
  }
  .nav-logo {
    width: 44px; height: 44px; border-radius: 13px;
    background: linear-gradient(135deg, #58a6ff, #a371f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff;
    margin-bottom: 20px;
  }
  .nav-item {
    width: 56px; padding: 10px 0 8px; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); }
  .nav-item.active { background: rgba(88,166,255,0.12); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item span { font-size: 9px; letter-spacing: 0.3px; }
  .nav-item.active span { color: #58a6ff; font-weight: 700; }
  .nav-item:not(.active) span { color: #6e7681; }
  .nav-spacer { flex: 1; }

  /* Main content */
  .main { flex: 1; display: flex; flex-direction: column; background: #0d1117; }

  /* Launch empty state */
  .launch-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; padding: 40px;
  }
  .launch-icon {
    width: 80px; height: 80px; border-radius: 20px;
    background: #161b22; border: 1px solid #21262d;
    display: flex; align-items: center; justify-content: center;
  }
  .launch-icon svg { width: 40px; height: 40px; stroke: #30363d; }
  .launch-title { font-size: 20px; font-weight: 700; color: #e6edf3; }
  .launch-subtitle { font-size: 13px; color: #8b949e; text-align: center; line-height: 1.5; max-width: 360px; }
  .launch-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn-primary {
    background: #58a6ff; color: #0d1117; padding: 10px 24px;
    border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary:hover { background: #79c0ff; }
  .btn-secondary {
    background: #21262d; color: #e6edf3; padding: 10px 20px;
    border-radius: 10px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid #30363d; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { background: #30363d; border-color: #484f58; }
  .launch-hint { font-size: 11px; color: #484f58; margin-top: 12px; }
  .launch-chips { display: flex; gap: 8px; margin-top: 4px; }
  .chip {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 8px 16px; font-size: 12px; color: #8b949e; cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: #30363d; color: #e6edf3; }

  /* Page label */
  .page-label {
    position: fixed; bottom: 12px; right: 16px;
    background: rgba(22,27,34,0.9); border: 1px solid #21262d;
    border-radius: 8px; padding: 6px 12px;
    font-size: 11px; color: #484f58;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div class="app">
  <!-- NavigationRail -->
  <nav class="navrail">
    <div class="nav-logo">C</div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Servers</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
        <polygon points="5 3 19 12 5 21"/>
      </svg>
      <span>Launch</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </div>
    <div class="nav-spacer"></div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="launch-empty">
      <div class="launch-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <polygon points="5 3 19 12 5 21" stroke="#30363d"/>
        </svg>
      </div>
      <div class="launch-title">Ready to Play</div>
      <div class="launch-subtitle">
        Create a local instance to start playing Minecraft.<br>
        You can also connect to a server to manage it remotely.
      </div>
      <div class="launch-actions">
        <button class="btn-primary">+ Create Instance</button>
        <button class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          Connect Server
        </button>
      </div>
      <div class="launch-hint">Quick start:</div>
      <div class="launch-chips">
        <div class="chip">NeoForge 1.20.4</div>
        <div class="chip">Fabric 1.21</div>
        <div class="chip">Vanilla 1.21</div>
        <div class="chip">Import .mrpack</div>
      </div>
    </div>
  </main>

  <div class="page-label">Screen 01 — First Launch</div>
</div>
</body>
</html>
