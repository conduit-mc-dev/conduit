<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>S01 — Servers 无 Daemon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #010409; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #e6edf3; overflow: hidden; }
  .app { display: flex; height: 100vh; width: 100vw; }

  /* NavigationRail */
  .navrail {
    width: 72px; flex-shrink: 0;
    background: #0d1117;
    border-right: 1px solid #21262d;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 6px;
  }
  .nav-logo {
    width: 44px; height: 44px; border-radius: 13px; overflow: hidden; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 20px;
  }
  .nav-item {
    width: 56px; padding: 10px 0 8px; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item span { font-size: 9px; }
  .nav-item.active { background: rgba(88,166,255,0.12); }
  .nav-item.active span { color: #58a6ff; font-weight: 700; }
  .nav-item:not(.active) span { color: #6e7681; }
  .nav-spacer { flex: 1; }

  /* Instance list panel */
  .list-panel {
    width: 220px; flex-shrink: 0; background: #0d1117;
    border-right: 1px solid #21262d;
    display: flex; flex-direction: column;
  }
  .list-search {
    padding: 12px 10px 8px; border-bottom: 1px solid #21262d;
  }
  .search-box {
    display: flex; align-items: center; gap: 6px;
    background: #161b22; border: 1px solid #21262d;
    border-radius: 8px; padding: 8px 10px;
  }
  .search-box svg { width: 14px; height: 14px; stroke: #484f58; flex-shrink: 0; }
  .search-box span { color: #484f58; font-size: 12px; }
  .list-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px; padding: 20px;
  }
  .list-empty svg { width: 36px; height: 36px; stroke: #30363d; }
  .list-empty-text { color: #30363d; font-size: 12px; }
  .list-bottom {
    border-top: 1px solid #21262d; padding: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  .list-bottom:hover { background: rgba(88,166,255,0.05); }
  .list-bottom svg { width: 14px; height: 14px; stroke: #58a6ff; }
  .list-bottom span { color: #58a6ff; font-size: 12px; font-weight: 500; }

  /* Content area */
  .content { flex: 1; background: #0d1117; display: flex; flex-direction: column; }

  /* Pairing form */
  .pair-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }
  .pair-form { width: 340px; }
  .pair-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
  }
  .pair-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: #161b22; border: 1px solid #21262d;
    display: flex; align-items: center; justify-content: center;
  }
  .pair-icon svg { width: 24px; height: 24px; stroke: #58a6ff; }
  .pair-title { font-size: 20px; font-weight: 700; }
  .pair-subtitle { font-size: 13px; color: #8b949e; margin-top: 2px; }

  .field { margin-bottom: 18px; }
  .field-label {
    font-size: 12px; color: #8b949e; font-weight: 600;
    margin-bottom: 6px; display: block;
  }
  .field-row { display: flex; gap: 8px; }
  .field-input {
    width: 100%; background: #161b22; border: 1px solid #21262d;
    border-radius: 8px; padding: 11px 14px; font-size: 13px;
    color: #e6edf3; outline: none; transition: border 0.15s;
  }
  .field-input:focus { border-color: #58a6ff; }
  .field-input::placeholder { color: #484f58; }
  .field-input.mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }

  .btn-connect {
    width: 100%; background: #58a6ff; color: #0d1117;
    padding: 12px; border-radius: 6px; font-size: 14px;
    font-weight: 700; cursor: pointer; border: none;
    transition: background 0.15s; margin-top: 6px;
  }
  .btn-connect:hover { background: #79c0ff; }
  .pair-hint {
    text-align: center; font-size: 11px; color: #484f58;
    margin-top: 14px; line-height: 1.5;
  }

  .page-label {
    position: fixed; bottom: 12px; right: 16px;
    background: rgba(22,27,34,0.9); border: 1px solid #21262d;
    border-radius: 8px; padding: 6px 12px;
    font-size: 11px; color: #484f58;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>

    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>

      <span>Servers</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2"><polygon points="5 3 19 12 5 21"/></svg>
      <span>Launch</span>

      <svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>

      </svg>
      <span>Settings</span>
    </div>
    <div class="nav-spacer"></div>
  </nav>

  <!-- Instance List Panel -->
  <aside class="list-panel">
    <div class="list-search">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>Search servers...</span>
      </div>
    </div>
    <div class="list-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <div class="list-empty-text">No servers</div>
    </div>
    <div class="list-bottom">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Pair Daemon</span>
    </div>
  </aside>

  <!-- Content: Pairing Form -->
  <main class="content">
    <div class="pair-container">
      <div class="pair-form">
        <div class="pair-header">
          <div class="pair-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div>
            <div class="pair-title">Connect to Daemon</div>
            <div class="pair-subtitle">Manage remote servers</div>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Server Address</label>
          <div class="field-row">
            <div style="flex:1;">
              <input class="field-input" placeholder="192.168.1.100 or domain.com" value="">
            </div>
            <div style="width:80px;">
              <input class="field-input" placeholder="8080" value="">
            </div>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Daemon Name</label>
          <input class="field-input" placeholder="Home VPS" value="">
          <div style="font-size:10px;color:#484f58;margin-top:4px;">A friendly name to identify this server</div>
        </div>

        <div class="field">
          <label class="field-label">Pairing Code</label>
          <input class="field-input mono" placeholder="XXXX-XXXX-XXXX" value="">
        </div>

        <button class="btn-connect">Connect</button>
        <div class="pair-hint">
          The pairing code is shown in your Daemon's console when it starts.<br>
          It expires after first use.
        </div>
      </div>
    </div>
  </main>

  <div class="page-label">S01 — No Daemon</div>
</div>
