<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>S07 — Players Tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #010409; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #e6edf3; overflow: hidden; }
  .app { display: flex; height: 100vh; width: 100vw; }
  .navrail { width: 72px; flex-shrink: 0; background: linear-gradient(180deg, #1a1a2e, #16213e); border-right: 1px solid rgba(88,166,255,0.12); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 6px; }
  .nav-logo { width: 44px; height: 44px; border-radius: 13px; background: linear-gradient(135deg, #58a6ff, #a371f7); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 20px; }
  .nav-item { width: 56px; padding: 10px 0 8px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-item svg { width: 22px; height: 22px; } .nav-item span { font-size: 9px; }
  .nav-item.active { background: rgba(88,166,255,0.12); } .nav-item.active span { color: #58a6ff; font-weight: 700; }
  .nav-item:not(.active) span { color: #6e7681; }
  .nav-spacer { flex: 1; }

  .list-panel { width: 220px; flex-shrink: 0; background: #0d1117; border-right: 1px solid #21262d; display: flex; flex-direction: column; }
  .list-search { padding: 12px 10px 8px; border-bottom: 1px solid #21262d; }
  .search-box { display: flex; align-items: center; gap: 6px; background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 8px 10px; }
  .search-box svg { width: 14px; height: 14px; stroke: #484f58; }
  .search-box span { color: #484f58; font-size: 12px; }
  .list-scroll { flex: 1; padding: 6px 10px; overflow-y: auto; }
  .daemon-label { display: flex; align-items: center; gap: 6px; padding: 8px 8px 6px; position: sticky; top: 0; background: #0d1117; z-index: 1; }
  .daemon-dot { width: 7px; height: 7px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 5px rgba(63,185,80,0.4); }
  .daemon-name { font-size: 10px; font-weight: 700; color: #8b949e; letter-spacing: 0.5px; }
  .daemon-status { font-size: 9px; color: #3fb950; margin-left: auto; }
  .daemon-gear { margin-left: 4px; cursor: pointer; opacity: 0.5; }
  .daemon-gear:hover { opacity: 1; }
  .daemon-gear svg { width: 12px; height: 12px; stroke: #8b949e; }

  .server-card { height: 58px; background: #161b22; border-radius: 10px; padding: 10px 14px; margin-bottom: 5px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; cursor: pointer; }
  .server-card.selected { border: 1px solid rgba(88,166,255,0.4); }
  .server-card:not(.selected) { border: 1px solid #21262d; }
  .card-top { display: flex; justify-content: space-between; align-items: center; }
  .card-name { font-size: 12px; font-weight: 700; color: #e6edf3; }
  .card-dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 6px #3fb950; }
  .card-info { font-size: 10px; color: #8b949e; margin-top: 3px; }
  .tail-card { height: 40px; border: 1.5px dashed #21262d; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer; margin-top: 6px; }
  .tail-card svg { width: 12px; height: 12px; stroke: #484f58; }
  .tail-card span { color: #484f58; font-size: 12px; }
  .list-bottom { border-top: 1px solid #21262d; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
  .list-bottom svg { width: 14px; height: 14px; stroke: #58a6ff; }
  .list-bottom span { color: #58a6ff; font-size: 12px; font-weight: 500; }

  .content { flex: 1; background: #0d1117; display: flex; flex-direction: column; }
  .content-header { background: #161b22; padding: 12px 16px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-name { font-size: 18px; font-weight: 800; }
  .header-status { display: flex; align-items: center; gap: 5px; }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 6px #3fb950; }
  .header-label { font-size: 12px; font-weight: 600; color: #3fb950; }
  .header-actions { display: flex; gap: 6px; }
  .btn { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
  .btn-stop { background: #238636; color: #fff; }
  .btn-kill { background: #30363d; color: #e6edf3; }

  .tabs { background: #161b22; padding: 0 16px; display: flex; border-bottom: 1px solid #21262d; }
  .tab { padding: 8px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #58a6ff; font-weight: 600; border-bottom-color: #58a6ff; }
  .tab:not(.active) { color: #8b949e; }

  .players-area { flex: 1; padding: 16px; overflow-y: auto; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat-card { flex: 1; background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-number { font-size: 28px; font-weight: 800; }
  .stat-number.green { color: #3fb950; }
  .stat-number.gray { color: #8b949e; }
  .stat-label { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .section-label { font-size: 10px; color: #484f58; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px; }
  .player-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 12px 16px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
  .player-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .player-info { flex: 1; }
  .player-name { font-size: 13px; font-weight: 600; }
  .player-detail { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .player-dot { width: 7px; height: 7px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 5px rgba(63,185,80,0.4); flex-shrink: 0; }

  .page-label { position: fixed; bottom: 12px; right: 16px; background: rgba(22,27,34,0.9); border: 1px solid #21262d; border-radius: 8px; padding: 6px 12px; font-size: 11px; color: #484f58; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="app">
  <nav class="navrail">
    <div class="nav-logo">C</div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Servers</span>
    </div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2"><polygon points="5 3 19 12 5 21"/></svg><span>Launch</span></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="#6e7681" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4"/></svg><span>Settings</span></div>
    <div class="nav-spacer"></div>
  </nav>

  <aside class="list-panel">
    <div class="list-search"><div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span>Search servers...</span></div></div>
    <div class="list-scroll">
      <div class="daemon-label">
        <div class="daemon-dot"></div>
        <span class="daemon-name">HOME VPS</span>
        <span class="daemon-status">online</span>
        <div class="daemon-gear"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4"/></svg></div>
      </div>
      <div class="server-card selected">
        <div class="card-top"><span class="card-name">Survival SMP</span><div class="card-dot"></div></div>
        <div class="card-info">NeoForge 1.20.4 · 2/20</div>
      </div>
      <div class="tail-card"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>New Server</span></div>
    </div>
    <div class="list-bottom"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>Pair Daemon</span></div>
  </aside>

  <main class="content">
    <div class="content-header">
      <div class="header-left">
        <span class="header-name">Survival SMP</span>
        <div class="header-status"><div class="header-dot"></div><span class="header-label">Running</span></div>
      </div>
      <div class="header-actions">
        <button class="btn btn-stop">Stop</button>
        <button class="btn btn-kill">Kill</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab">Console</div>
      <div class="tab">Mods (42)</div>
      <div class="tab active">Players</div>
      <div class="tab">Config</div>
      <div class="tab">Files</div>
    </div>
    <div class="players-area">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number green">2</div>
          <div class="stat-label">Online</div>
        </div>
        <div class="stat-card">
          <div class="stat-number gray">20</div>
          <div class="stat-label">Max Players</div>
        </div>
      </div>
      <div class="section-label">ONLINE NOW</div>
      <div class="player-card">
        <div class="player-avatar" style="background:linear-gradient(135deg,#3fb950,#2d7d46);">S</div>
        <div class="player-info">
          <div class="player-name">Steve</div>
          <div class="player-detail">Connected since 12:35</div>
        </div>
        <div class="player-dot"></div>
      </div>
      <div class="player-card">
        <div class="player-avatar" style="background:linear-gradient(135deg,#58a6ff,#388bfd);">A</div>
        <div class="player-info">
          <div class="player-name">Alex</div>
          <div class="player-detail">Connected since 12:36</div>
        </div>
        <div class="player-dot"></div>
      </div>
    </div>
  </main>

  <div class="page-label">S07 — Players Tab</div>
</div>
</body>
</html>
